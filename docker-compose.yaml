services:
  # ==========================================================================
  # CORE INFRASTRUCTURE
  # ==========================================================================

  # 1. PostgreSQL (Database Utama)
  postgres:
    image: postgres:15-alpine
    container_name: payment_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: payment_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    labels:
      logging: "true"

  # 2. Redis (Cache & Distributed Lock)
  redis:
    image: redis:7-alpine
    container_name: payment_redis
    restart: always
    ports:
      - "6379:6379"
    labels:
      logging: "true"

  # 3. Zookeeper (Kafka Cluster Manager)
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: payment_zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # 4. Apache Kafka (Message Broker)
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: payment_kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    labels:
      logging: "true"

  # 5. Kafka UI (Dashboard Web) — http://localhost:8080
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: payment_kafka_ui
    restart: always
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: Local-Confluent-Kafka
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka

  # ==========================================================================
  # OBSERVABILITY STACK (Metrics + Logs + Dashboards)
  # ==========================================================================

  # 6. Prometheus (Metrics Collection) — http://localhost:9090
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: payment_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    labels:
      logging: "true"

  # 7. Loki (Log Aggregation) — http://localhost:3100
  #    Lightweight alternative to ELK Stack, pairs natively with Grafana.
  loki:
    image: grafana/loki:3.1.0
    container_name: payment_loki
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./configs/loki.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    labels:
      logging: "true"

  # 8. Promtail (Log Shipper) — collects Docker container logs → pushes to Loki
  promtail:
    image: grafana/promtail:3.1.0
    container_name: payment_promtail
    restart: always
    volumes:
      - ./configs/promtail.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  # 9. Grafana (Dashboard & Visualization) — http://localhost:3000
  #    Login: admin / admin
  #    Pre-configured with Prometheus + Loki datasources.
  grafana:
    image: grafana/grafana:11.1.0
    container_name: payment_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - loki
    labels:
      logging: "true"

  # 9. Jaeger (Distributed Tracing) — http://localhost:16686
  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: payment_jaeger
    restart: always
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686" # UI
      - "4317:4317"   # OTLP gRPC receiver
    labels:
      logging: "true"

volumes:
  postgres_data: