# Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Mini Payment Switch app metrics
  - job_name: "payment-switch"
    static_configs:
      - targets: ["host.docker.internal:8182"]
        labels:
          service: "mini-payment-switch"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
