app:
  name: "mini-payment-switch"
  port: 8182
  env: "development"
  otel:
    collector_url: "localhost:4317"

database:
  host: "localhost"
  port: 5432
  user: "admin"
  password: "secretpassword"
  name: "payment_db"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: "5m"

redis:
  addr: "localhost:6379"
  password: ""
  db: 0

kafka:
  brokers:
    - "localhost:9092"
  topic:
    payment_success: "payment-success"
  consumer_group: "notification-service-group"

